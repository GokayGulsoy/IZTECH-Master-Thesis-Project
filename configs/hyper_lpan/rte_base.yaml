# HyPER-LPAN config: BERT-base on RTE
# RTE has only 2.5k train examples — very small, needs longer training.
model: base
task: rte
max_seq_len: 128
seed: 42

linear_mixing_layers: [0, 1, 2, 3]
quad_attention_layers: [4, 5, 6, 7]

epochs_per_layer: 8
lr: 3.0e-5
batch_size: 16
gamma: 4.0
gamma_decay: true
stage_order: quad_first
lr_schedule: constant_with_warmup

final_epochs: 8
global_gamma: 2.0
global_lr_div: 3.0

auto_train_lpan: false
