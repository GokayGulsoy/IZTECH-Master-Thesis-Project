# HyPER-LPAN config: BERT-base on SST-2
# Validated final accuracy: 90.83% (LPAN baseline 91.28%, drop -0.45%)
model: base
task: sst2
max_seq_len: 64
seed: 42

# Layer composition (4-4-4 split, validated)
linear_mixing_layers: [0, 1, 2, 3]
quad_attention_layers: [4, 5, 6, 7]
# LPAN preserved at: [8, 9, 10, 11]

# Stages B & C: progressive replacement
epochs_per_layer: 4
lr: 8.0e-5
batch_size: 32
gamma: 4.0
gamma_decay: true
stage_order: quad_first  # mid-first ordering preserves clean teacher signal
lr_schedule: constant_with_warmup

# Stage D: global fine-tune
final_epochs: 4
global_gamma: 2.0
global_lr_div: 3.0

# Stage A: LPAN must already exist at canonical path; auto-train if missing
auto_train_lpan: false
