# HyPER-LPAN config: BERT-base on QNLI
# QNLI has 105k train examples; longer sequences (avg ~50 tokens).
model: base
task: qnli
max_seq_len: 128
seed: 42

linear_mixing_layers: [0, 1, 2, 3]
quad_attention_layers: [4, 5, 6, 7]

epochs_per_layer: 3
lr: 8.0e-5
batch_size: 32
gamma: 4.0
gamma_decay: true
stage_order: quad_first
lr_schedule: constant_with_warmup

final_epochs: 3
global_gamma: 2.0
global_lr_div: 3.0

auto_train_lpan: false
